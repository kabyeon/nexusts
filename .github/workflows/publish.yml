name: Publish packages to npm

# This workflow publishes all 31 packages to npm. Triggers:
#   - on release (auto-publish on GitHub release)
#   - on workflow_dispatch (manual trigger; choose dry-run or publish)
#
# Both paths now share the same publish step so manual triggers
# can also do real publishes (useful when the auto-publish run
# hit a transient npm rate limit).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: "publish, dry-run, or build"
        required: false
        default: "dry-run"

jobs:
  publish:
    # Use a specific image instead of ubuntu-latest so the runner
    # comes from a more stable IP pool. The default pool has been
    # rate-limited by npm registry on previous runs.
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build:all || bun run build

      - name: Publish to npm
        if: >
          github.event_name == 'release'
          || (github.event_name == 'workflow_dispatch'
              && (inputs.mode == 'publish' || inputs.mode == ''))
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run scripts/publish.ts

      - name: Dry run (no actual publish)
        if: >
          github.event_name == 'workflow_dispatch'
          && inputs.mode == 'dry-run'
        run: |
          echo "Dry run — checking package.json validity for all 31 packages"
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              echo "✓ $pkg/package.json"
              node -e "JSON.parse(require('fs').readFileSync('$pkg/package.json', 'utf8'))" || exit 1
            fi
          done
